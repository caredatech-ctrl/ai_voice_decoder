<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Voice Matrix</title>
    <style>
        :root { --neon-blue: #00f0ff; --neon-purple: #8a2be2; --dark-bg: #0b0c10; --glass-bg: rgba(20, 22, 30, 0.65); --success-color: #00ff88; --fail-color: #ff3366; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at center, #1a1a2e 0%, var(--dark-bg) 70%, #000 100%); color: #e0e6ed; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .command-center { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; width: 100%; max-width: 600px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; text-align: center; text-transform: uppercase; font-weight: 300; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #a0aec0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="file"] { width: 100%; background: rgba(0,0,0,0.4); border: 1px dashed var(--neon-blue); padding: 15px; border-radius: 8px; color: #fff; margin-bottom: 20px; box-sizing: border-box; cursor: pointer; }
        button { width: 100%; background: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(138,43,226,0.1)); border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 16px; border-radius: 8px; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        button:hover:not(:disabled) { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        button:disabled { border-color: #4a5568; color: #4a5568; background: rgba(0,0,0,0.5); cursor: not-allowed; }
        .terminal { background: #000; border: 1px solid #333; border-radius: 8px; width: 100%; padding: 15px; font-family: 'Consolas', monospace; font-size: 12px; color: #00ff00; height: 150px; overflow-y: auto; margin-top: 20px; display: none; box-sizing: border-box; }
        #results { display: none; margin-top: 20px; padding: 25px; border-radius: 12px; text-align: center; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }
        .match-yes { border-color: var(--success-color) !important; color: var(--success-color); box-shadow: 0 0 30px rgba(0,255,136,0.1); }
        .match-no { border-color: var(--fail-color) !important; color: var(--fail-color); box-shadow: 0 0 30px rgba(255,51,102,0.1); }
        .confidence-score { font-size: 42px; font-weight: 300; margin: 10px 0 0 0; color: #fff; }
    </style>
</head>
<body>

    <div class="command-center">
        <h1>Voice Matrix Engine</h1>
        
        <form id="analyzeForm">
            <label>Target Identity Alpha (Audio 1)</label>
            <input type="file" id="audio1" accept="audio/*" required>
            
            <label>Target Identity Beta (Audio 2)</label>
            <input type="file" id="audio2" accept="audio/*" required>

            <button type="submit" id="executeBtn">Initiate Direct Processing</button>
        </form>

        <div class="terminal" id="terminal"></div>

        <div id="results">
            <h2 id="verdict" style="margin:0; font-size:24px; letter-spacing:2px;"></h2>
            <div style="color: #a0aec0; font-size: 12px; margin-top: 15px; text-transform: uppercase;">Similarity Score</div>
            <p class="confidence-score"><span id="percentage">0</span>%</p>
        </div>
    </div>

    <script>
        // Directly hardwired to your exact Hugging Face container
        const AI_ENGINE_URL = 'https://dali135-voice-matrix-engine.hf.space/analyze';
        const terminal = document.getElementById('terminal');

        function log(msg) {
            terminal.style.display = 'block';
            terminal.innerHTML += `<div>> ${msg}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        document.getElementById('analyzeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const file1 = document.getElementById('audio1').files[0];
            const file2 = document.getElementById('audio2').files[0];
            const btn = document.getElementById('executeBtn');
            const resultsDiv = document.getElementById('results');
            
            btn.disabled = true;
            btn.innerText = "Extracting Voiceprints...";
            resultsDiv.style.display = 'none';
            terminal.innerHTML = "";
            
            log("INITIATING DIRECT AI PIPELINE...");
            log(`Host URL: window.location.hostname`);
            log(`Packaging Alpha Payload...`);
            log(`Packaging Beta Payload...`);

            const formData = new FormData();
            formData.append('audio1', file1);
            formData.append('audio2', file2);

            try {
                log(`Uplinking directly to Hugging Face Mainframe...`);
                log(`Waiting for Neural Extractor (Takes 15-45 seconds)...`);
                
                const response = await fetch(AI_ENGINE_URL, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText}`);
                }
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                log("ANALYSIS COMPLETE. SECURE CONNECTION CLOSED.");
                
                resultsDiv.style.display = 'block';
                document.getElementById('percentage').innerText = data.percentage;
                
                if (data.match) {
                    resultsDiv.className = 'match-yes';
                    document.getElementById('verdict').innerHTML = "MATCH CONFIRMED";
                } else {
                    resultsDiv.className = 'match-no';
                    document.getElementById('verdict').innerHTML = "IDENTITY MISMATCH";
                }
            } catch (error) {
                log(`<span style="color:#ff3366">SYSTEM FAILURE: ${error.message}</span>`);
            } finally {
                btn.disabled = false;
                btn.innerText = "Initiate Direct Processing";
            }
        });
    </script>
</body>
</html>
